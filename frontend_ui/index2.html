function useToast() {
  const [toast, setToast] = useState(null);
  const timer = useRef();
  const show = useCallback((msg, type='default') => {
    clearTimeout(timer.current);
    setToast({msg, type});
    timer.current = setTimeout(() => setToast(null), 2600);
  }, []);
  return [toast, show];
}

function useClock() {
  const [time, setTime] = useState('');
  useEffect(() => {
    const tick = () => {
      const n = new Date();
      setTime(`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`);
    };
    tick(); const t = setInterval(tick, 10000); return () => clearInterval(t);
  }, []);
  return time;
}

/* ═══════════════════════════════════════════════════════
   QR CANVAS
═══════════════════════════════════════════════════════ */
function QRCanvas({refCode, size=180}) {
  const ref = useRef();
  useEffect(() => {
    const canvas = ref.current; if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const mod = 25, cell = (size-20)/mod, offset = 10;
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#1C1A17';
    let seed = refCode.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const rand = () => { seed=(seed*1664525+1013904223)&0xFFFFFFFF; return (seed>>>0)/0xFFFFFFFF; };
    for(let r=0;r<mod;r++) for(let c=0;c<mod;c++) if(rand()>.5) ctx.fillRect(offset+c*cell,offset+r*cell,cell-1,cell-1);
    const finder = (x,y) => {
      ctx.fillStyle='#fff'; ctx.fillRect(offset+x*cell,offset+y*cell,7*cell,7*cell);
      ctx.fillStyle='#1C1A17'; ctx.fillRect(offset+x*cell,offset+y*cell,7*cell,7*cell);
      ctx.fillStyle='#fff'; ctx.fillRect(offset+(x+1)*cell,offset+(y+1)*cell,5*cell,5*cell);
      ctx.fillStyle='#1C1A17'; ctx.fillRect(offset+(x+2)*cell,offset+(y+2)*cell,3*cell,3*cell);
    };
    finder(0,0); finder(mod-7,0); finder(0,mod-7);
  }, [refCode, size]);
  return <canvas ref={ref} width={size} height={size} style={{borderRadius:8,display:'block'}}/>;
}

        {meal.badge && (
          <span style={{
            position:'absolute',top:8,left:8,
            background:meal.badge==='popular'?'#C4522A':meal.badge==='new'?'#D4831A':'#4A6741',
            color:'#fff',fontSize:8,fontWeight:700,letterSpacing:.8,
            padding:'2px 7px',borderRadius:5,textTransform:'uppercase',
          }}>{meal.badge}</span>
        )}
        {!meal.stock && <span style={{position:'absolute',top:8,right:8,background:'rgba(28,26,23,.65)',color:'#fff',fontSize:8,fontWeight:600,padding:'2px 7px',borderRadius:5}}>SOLD OUT</span>}
      </div>
      <div style={{padding:'10px 12px 12px'}}>
        <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:13,marginBottom:2,lineHeight:1.25,color:'#1C1A17'}}>{meal.name}</div>
        <div style={{fontSize:10.5,color:'var(--muted)',marginBottom:8,lineHeight:1.4}}>{meal.desc}</div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:14,color:'#1C1A17'}}>
            {fmt(meal.price)} <span style={{fontSize:9,fontWeight:400,color:'var(--muted)',fontFamily:'DM Sans,sans-serif'}}>TZS</span>
          </div>
          {meal.stock && (
            <button onClick={handleQuickAdd} style={{
              width:28,height:28,borderRadius:'50%',
              background:added?'#4A6741':'#1C1A17',
              color:'#fff',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',
              transition:'background .15s,transform .1s',border:'none',
              animation:added?'pop .3s ease':'none',
            }}
            onMouseEnter={e=>!added&&(e.currentTarget.style.background='#C4522A')}
            onMouseLeave={e=>!added&&(e.currentTarget.style.background='#1C1A17')}
            >{added?'✓':'+'}</button>
          )}
        </div>
      </div>
    </div>
  );
}

function DrinkChip({drink, onAdd}) {
  const [added, setAdded] = useState(false);
  return (
    <div style={{
      display:'flex',alignItems:'center',gap:9,
      background:'#fff',border:'1px solid var(--border)',
      borderRadius:50,padding:'7px 13px 7px 9px',
      cursor:'pointer',transition:'border-color .15s,transform .15s',
    }}
    onMouseEnter={e=>{e.currentTarget.style.borderColor='#1C1A17';e.currentTarget.style.transform='translateY(-1px)'}}
    onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.transform=''}}>
      <span style={{fontSize:20}}>{drink.emoji}</span>
      <div>
        <div style={{fontSize:12,fontWeight:500,lineHeight:1}}>{drink.name}</div>
        <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>{fmt(drink.price)} TZS</div>
      </div>
      <button onClick={()=>{onAdd(drink,1);setAdded(true);setTimeout(()=>setAdded(false),700)}} style={{
        width:22,height:22,borderRadius:'50%',
        background:added?'#4A6741':'#1C1A17',
        color:'#fff',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',
        marginLeft:4,transition:'background .15s',border:'none',
      }}>{added?'✓':'+'}</button>
    </div>
  );
}

function MenuPage({cart, setCart, setPage}) {
  const {showToast} = useContext(AppCtx);
  const [cat, setCat] = useState('all');
  const [modalMeal, setModalMeal] = useState(null);
  const [modalQty, setModalQty] = useState(1);
  const [search, setSearch] = useState('');

  const addToCart = useCallback((item, qty) => {
    setCart(prev => {
      const next = {...prev};
      next[item.id] = next[item.id] ? {...next[item.id], qty: next[item.id].qty+qty} : {...item, qty};
      return next;
    });
    showToast(`✓ ${item.name.split(' ')[0]} added`, 'success');
  }, [setCart, showToast]);

  const allItems = [...MEALS, ...DRINKS];
  const filtered = useMemo(() => {
    let items = cat==='all' ? MEALS : cat==='drinks' ? DRINKS : MEALS.filter(m=>m.cat===cat);
    if (search.trim()) items = [...MEALS,...DRINKS].filter(m=>m.name.toLowerCase().includes(search.toLowerCase())||m.desc.toLowerCase().includes(search.toLowerCase()));
    return items;
  }, [cat, search]);

  const showDrinks = (cat==='all' || cat==='drinks') && !search;
  const showMeals = cat!=='drinks' || !!search;
  const mealItems = search ? filtered.filter(m=>m.cat!=='drinks') : (cat==='drinks'?[]:filtered);
  const drinkItems = search ? filtered.filter(m=>m.cat==='drinks') : DRINKS;

  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 310px',flex:1,minHeight:0,overflow:'hidden'}}>
      {/* LEFT: menu */}
      <div style={{display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* hero */}
        <div style={{background:'#2D2520',padding:'20px 20px 16px',flexShrink:0,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:-60,right:-60,width:200,height:200,borderRadius:'50%',background:'radial-gradient(circle,rgba(196,82,42,.18) 0%,transparent 70%)',pointerEvents:'none'}}/>
          <div style={{fontSize:9,letterSpacing:2.5,textTransform:'uppercase',color:'#F0A030',fontWeight:600,marginBottom:3}}>Today's canteen</div>
          <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:22,color:'#F5F0E8',lineHeight:1.1,marginBottom:2}}>What are you having today?</div>
          <div style={{fontSize:11,color:'#6A6050',marginBottom:14}}>Fresh meals served 07:00 – 20:00</div>
          <div style={{display:'flex',gap:5}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search meals & drinks…"
              style={{flex:1,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#F5F0E8',placeholder:'#6A6050'}}
            />
            {search && <button onClick={()=>setSearch('')} style={{background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:8,padding:'8px 12px',color:'#9A9080',fontSize:12}}>✕</button>}
          </div>
        </div>

        {/* category tabs */}
        {!search && (
          <div style={{background:'#FAFAF7',borderBottom:'1px solid var(--border)',flexShrink:0}}>
            <div style={{display:'flex',overflowX:'auto',padding:'0 16px',scrollbarWidth:'none'}}>
              {CATS.map(c => {
                const count = c.key==='all'?MEALS.length+DRINKS.length:c.key==='drinks'?DRINKS.length:MEALS.filter(m=>m.cat===c.key).length;
                return (
                  <button key={c.key} onClick={()=>setCat(c.key)} style={{
                    padding:'11px 14px',fontSize:12,fontWeight:500,whiteSpace:'nowrap',
                    color:cat===c.key?'#C4522A':'var(--muted)',
                    borderBottom:`2px solid ${cat===c.key?'#C4522A':'transparent'}`,
                    transition:'color .15s,border-color .15s',display:'flex',alignItems:'center',gap:4,
                  }}>
                    {c.label}
                    <span style={{background:cat===c.key?'#F5E8E2':'#EDE8DF',color:cat===c.key?'#C4522A':'var(--muted)',borderRadius:10,padding:'1px 6px',fontSize:9,fontWeight:600}}>{count}</span>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* grid */}
        <div style={{overflowY:'auto',padding:18,flex:1}}>
          {search && filtered.length===0 && (
            <div style={{textAlign:'center',padding:'60px 20px',color:'var(--muted)'}}>
              <div style={{fontSize:36,marginBottom:12}}>🔍</div>
              <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:16,marginBottom:4}}>No results for "{search}"</div>
              <div style={{fontSize:13}}>Try a different search term</div>
            </div>
          )}
          {showMeals && mealItems.length>0 && (
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                <span style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:15}}>{search?'Meals':''}
                  {!search&&(cat==='all'?'All meals':cat.charAt(0).toUpperCase()+cat.slice(1))}</span>
                <span style={{fontSize:11,color:'var(--muted)'}}>{mealItems.length} item{mealItems.length!==1?'s':''}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(185px,1fr))',gap:11,marginBottom:22}}>
                {mealItems.map(m => <MealCard key={m.id} meal={m} onAdd={addToCart} onOpen={m=>{setModalMeal(m);setModalQty(1)}}/>)}
              </div>
            </>
          )}
          {showDrinks && drinkItems.length>0 && (
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <span style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:15}}>Drinks</span>
                <span style={{fontSize:11,color:'var(--muted)'}}>{drinkItems.length} options</span>
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {drinkItems.map(d => <DrinkChip key={d.id} drink={d} onAdd={addToCart}/>)}
              </div>
            </>
          )}
          {search && drinkItems.length>0 && (
            <>
              <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:15,margin:'16px 0 10px'}}>Drinks</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {drinkItems.map(d => <DrinkChip key={d.id} drink={d} onAdd={addToCart}/>)}
              </div>
            </>
          )}
        </div>
      </div>

      {/* RIGHT: cart */}
      <CartSidebar cart={cart} setCart={setCart} setPage={setPage}/>

      {/* meal detail modal */}
      <Modal open={!!modalMeal} onClose={()=>setModalMeal(null)}>
        {modalMeal && <>
          <div style={{fontSize:52,textAlign:'center',marginBottom:10}}>{modalMeal.emoji}</div>
          <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:18,marginBottom:2}}>{modalMeal.name}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:10,lineHeight:1.5}}>{modalMeal.desc}</div>
          <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
            <span style={{background:'#F5E8E2',color:'#C4522A',fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:13,padding:'4px 12px',borderRadius:20}}>{fmt(modalMeal.price)} TZS</span>
            {modalMeal.calories && <span style={{background:'#EDE8DF',color:'var(--muted)',fontSize:11,padding:'4px 10px',borderRadius:20}}>~{modalMeal.calories} kcal</span>}
            {modalMeal.badge && <Badge color={modalMeal.badge==='popular'?'rust':modalMeal.badge==='new'?'amber':'sage'}>{modalMeal.badge}</Badge>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:14,justifyContent:'center',padding:14,background:'#EDE8DF',borderRadius:12,marginBottom:16}}>
            <button onClick={()=>setModalQty(q=>Math.max(1,q-1))} style={{width:36,height:36,borderRadius:'50%',border:'1.5px solid var(--border)',background:'#fff',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'border-color .15s'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor='#1C1A17'}
            onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>−</button>
            <span style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:26,minWidth:36,textAlign:'center'}}>{modalQty}</span>
            <button onClick={()=>setModalQty(q=>q+1)} style={{width:36,height:36,borderRadius:'50%',border:'1.5px solid var(--border)',background:'#fff',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'border-color .15s'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor='#1C1A17'}
            onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}
            >+</button>
          </div>
          <Btn fullWidth variant="primary" onClick={()=>{addToCart(modalMeal,modalQty);setModalMeal(null);}}>
            Add to order — TZS {fmt(modalMeal.price*modalQty)}
          </Btn>
        </>}
      </Modal>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   CART SIDEBAR (shared across menu & cart page)
═══════════════════════════════════════════════════════ */
function CartSidebar({cart, setCart, setPage}) {
  const {showToast} = useContext(AppCtx);
  const [payMethod, setPayMethod] = useState('mpesa');
  const [phone, setPhone] = useState('');
  const [payState, setPayState] = useState(null);
  const [qrRef, setQrRef] = useState('');
  const [countdown, setCountdown] = useState(25);

  const cartIds = Object.keys(cart);
  const subtotal = cartIds.reduce((s,k)=>s+cart[k].price*cart[k].qty,0);
  const service = Math.round(subtotal*0.02);
  const total = subtotal+service;
  const itemCount = cartIds.reduce((s,k)=>s+cart[k].qty,0);
  const isEmpty = cartIds.length===0;

  const changeQty = (id, d) => setCart(prev => {
    const next={...prev};
    if(!next[id])return prev;
    next[id]={...next[id],qty:next[id].qty+d};
    if(next[id].qty<=0)delete next[id];
    return next;
  });

  const startCheckout = () => {
    const digits = phone.replace(/\D/g,'');
    if(digits.length<9){showToast('⚠ Enter your phone number','error');return;}
    if(isEmpty)return;
    setPayState('processing');
    let c=25; setCountdown(25);
    const t=setInterval(()=>{c--;setCountdown(c);if(c<=0)clearInterval(t);},1000);
    setTimeout(()=>{clearInterval(t);setQrRef(genRef());setPayState('success');},3000);
  };

  const payColors = {mpesa:'#00A651',tigo:'#003087',halo:'#E31837'};
  const payLabels = {mpesa:'M-Pesa',tigo:'Tigo Pesa',halo:'HaloPesa'};

  return (
    <div style={{background:'#FAFAF7',borderLeft:'1px solid var(--border)',display:'flex',flexDirection:'column',height:'calc(100vh - 52px)',position:'sticky',top:52,overflowY:'auto'}}>
      {/* header */}
      <div style={{padding:'14px 16px 12px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <span style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:14}}>Your order</span>
        <span style={{
          background:isEmpty?'#EDE8DF':'#C4522A',color:isEmpty?'var(--muted)':'#fff',
          borderRadius:10,padding:'2px 8px',fontSize:10,fontWeight:600,transition:'all .2s',
        }}>{itemCount} item{itemCount!==1?'s':''}</span>
      </div>

      {isEmpty ? (
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,padding:24,textAlign:'center'}}>
          <div style={{fontSize:38,opacity:.2}}>🍽️</div>
          <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>Add meals from the menu<br/>to get started</div>
        </div>
      ) : (
        <>
          {/* items */}
          <div style={{flex:1,padding:'12px 14px',display:'flex',flexDirection:'column',gap:10,overflowY:'auto'}}>
            {cartIds.map(k => {
              const it = cart[k];
              return (
                <div key={k} style={{display:'flex',alignItems:'center',gap:8,animation:'slideLeft .2s ease'}}>
                  <span style={{fontSize:24,flexShrink:0}}>{it.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{it.name}</div>
                    <div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{fmt(it.price*it.qty)} TZS</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
                    <button onClick={()=>changeQty(k,-1)} style={{width:22,height:22,borderRadius:'50%',border:'1px solid var(--border)',background:'#fff',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'border-color .15s'}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor='#1C1A17'}
                    onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>−</button>
                    <span style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:13,minWidth:16,textAlign:'center'}}>{it.qty}</span>
                    <button onClick={()=>changeQty(k,1)} style={{width:22,height:22,borderRadius:'50%',border:'1px solid var(--border)',background:'#fff',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'border-color .15s'}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor='#1C1A17'}
                    onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>+</button>
                  </div>
                </div>
              );
            })}
          </div>

          {/* summary */}
          <div style={{borderTop:'1px solid var(--border)',padding:'12px 14px',flexShrink:0}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)',marginBottom:4}}><span>Subtotal</span><span>TZS {fmt(subtotal)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)'}}><span>Service (2%)</span><span>TZS {fmt(service)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:700,marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)'}}><span>Total</span><span>TZS {fmt(total)}</span></div>
          </div>

          {/* payment */}
          <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)',flexShrink:0}}>
            <div style={{fontSize:9,fontWeight:600,letterSpacing:1.2,textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>Pay with</div>
            <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:9}}>
              {['mpesa','tigo','halo'].map(m => (
                <div key={m} onClick={()=>setPayMethod(m)} style={{
                  display:'flex',alignItems:'center',gap:8,padding:'8px 10px',
                  border:`1.5px solid ${payMethod===m?'#C4522A':'var(--border)'}`,
                  borderRadius:8,cursor:'pointer',background:payMethod===m?'#FDF5F2':'#fff',
                  transition:'all .15s',
                }}>
                  <div style={{width:34,height:20,borderRadius:4,background:payColors[m],display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:800,color:'#fff',flexShrink:0}}>{payLabels[m]}</div>
                  <span style={{fontSize:12,fontWeight:500,flex:1}}>{payLabels[m]}</span>
                  <div style={{width:14,height:14,borderRadius:'50%',border:`1.5px solid ${payMethod===m?'#C4522A':'var(--border)'}`,background:payMethod===m?'#C4522A':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {payMethod===m && <div style={{width:5,height:5,borderRadius:'50%',background:'#fff'}}/>}
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',border:`1.5px solid ${phone?'#C4522A':'var(--border)'}`,borderRadius:8,overflow:'hidden',background:'#fff',transition:'border-color .15s'}}>
              <div style={{padding:'8px 10px',fontSize:11,fontWeight:500,color:'var(--muted)',background:'var(--tag)',borderRight:'1px solid var(--border)',whiteSpace:'nowrap'}}>🇹🇿 +255</div>
              <input value={phone} onChange={e=>setPhone(e.target.value)} type="tel" maxLength={9} placeholder="7XX XXX XXX"
                style={{flex:1,padding:'8px 10px',fontSize:12,background:'transparent'}}/>
            </div>
          </div>

          {/* checkout */}
          <div style={{padding:'10px 14px 16px',flexShrink:0}}>
            <button onClick={startCheckout} style={{
              width:'100%',background:'#1C1A17',color:'#F5F0E8',border:'none',borderRadius:10,
              padding:'13px 14px',fontFamily:'Syne,sans-serif',fontSize:13,fontWeight:700,
              display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',
              transition:'background .18s',
            }}
            onMouseEnter={e=>e.currentTarget.style.background='#C4522A'}
            onMouseLeave={e=>e.currentTarget.style.background='#1C1A17'}>
              <span>Pay now</span>
              <span style={{background:'rgba(255,255,255,.12)',padding:'3px 9px',borderRadius:6,fontSize:12}}>TZS {fmt(total)}</span>
            </button>
          </div>
        </>
      )}

      {/* payment processing modal */}
      {payState && (
        <div style={{position:'fixed',inset:0,background:'rgba(28,26,23,.6)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:500,backdropFilter:'blur(3px)'}}>
          <div style={{background:'#FAFAF7',borderRadius:'20px 20px 0 0',padding:'24px 22px 36px',width:'100%',maxWidth:440,animation:'fadeUp .28s cubic-bezier(.34,1.56,.64,1)'}}>
            <div style={{width:40,height:4,background:'var(--border)',borderRadius:2,margin:'0 auto 22px'}}/>
            {payState==='processing' ? (
              <div style={{textAlign:'center'}}>
                <div style={{width:40,height:40,border:'3px solid var(--border)',borderTopColor:'#C4522A',borderRadius:'50%',margin:'0 auto 16px',animation:'spin .7s linear infinite'}}/>
                <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:18,marginBottom:5}}>Awaiting payment</div>
                <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.7}}>Check your phone for the<br/>{payLabels[payMethod]} STK push</div>
                <div style={{fontSize:10,color:'var(--muted)',opacity:.5,marginTop:12,animation:'pulse 1s ease infinite'}}>Expires in {countdown}s</div>
              </div>
            ) : (
              <div style={{textAlign:'center'}}>
                <div style={{width:54,height:54,borderRadius:'50%',background:'#4A6741',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',fontSize:24,color:'#fff'}}>✓</div>
                <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:19,marginBottom:3}}>Payment confirmed!</div>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>Show this QR code at the counter</div>
                <div style={{width:180,height:180,background:'#fff',border:'2px solid var(--border)',borderRadius:12,margin:'0 auto 10px',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
                  <QRCanvas refCode={qrRef} size={180}/>
                </div>
                <div style={{fontFamily:'Syne,sans-serif',fontSize:12,fontWeight:700,letterSpacing:2,color:'var(--muted)',marginBottom:4}}>{qrRef}</div>
                <div style={{fontSize:10,color:'var(--muted)',lineHeight:1.7,maxWidth:240,margin:'0 auto 18px'}}>Show to canteen staff to receive your order.<br/>Valid 30 minutes · one use only.</div>
                <button onClick={()=>{setPayState(null);setCart({});setPhone('');}} style={{background:'#EDE8DF',border:'none',borderRadius:9,padding:'11px 26px',fontFamily:'Syne,sans-serif',fontSize:13,fontWeight:600,cursor:'pointer',color:'#1C1A17',transition:'background .15s'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--border)'}

}

/* ═══════════════════════════════════════════════════════
   PAGE: STAFF SCANNER
═══════════════════════════════════════════════════════ */
function ScannerPage() {
  const {showToast} = useContext(AppCtx);
  const [input, setInput] = useState('');
  const [result, setResult] = useState(null);
  const [scanning, setScanning] = useState(false);

  const handleVerify = (code) => {
    const c = (code||input).toUpperCase().trim();
    if (!c) return;
    setScanning(true);
    setResult(null);
    setTimeout(() => {
      setScanning(false);
      const order = SAMPLE_ORDERS.find(o=>o.id===c);
      if (order) {
        if (order.status==='served') {
          setResult({type:'used',order});
          showToast('⚠ QR already used', 'error');
        } else {
          setResult({type:'valid',order});
          showToast('✓ Valid order — ready to serve', 'success');
        }
      } else {
        setResult({type:'invalid'});
        showToast('✗ Invalid QR code', 'error');
      }
    }, 1200);
  };

  const markServed = () => {
    if (result?.order) {
      result.order.status = 'served';
      setResult({...result, type:'done'});
      showToast('✓ Order marked as served', 'success');
    }
  };

  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0,flex:1,overflow:'hidden'}}>
      {/* scanner panel */}
      <div style={{padding:28,borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:20,animation:'fadeIn .25s ease'}}>
        <div>
          <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:20,marginBottom:2}}>QR Scanner</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>Verify student orders at the counter</div>
        </div>

        {/* simulated scanner viewfinder */}
        <div style={{background:'#1C1A17',borderRadius:16,padding:20,position:'relative',overflow:'hidden',aspectRatio:'1',maxWidth:320}}>
          <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:'#C4522A',opacity:.7,animation:'scanline 2s linear infinite'}}/>
          <div style={{position:'absolute',top:16,left:16,width:40,height:40,borderTop:'3px solid #E8693D',borderLeft:'3px solid #E8693D',borderRadius:'4px 0 0 0'}}/>
          <div style={{position:'absolute',top:16,right:16,width:40,height:40,borderTop:'3px solid #E8693D',borderRight:'3px solid #E8693D',borderRadius:'0 4px 0 0'}}/>
          <div style={{position:'absolute',bottom:16,left:16,width:40,height:40,borderBottom:'3px solid #E8693D',borderLeft:'3px solid #E8693D',borderRadius:'0 0 0 4px'}}/>
          <div style={{position:'absolute',bottom:16,right:16,width:40,height:40,borderBottom:'3px solid #E8693D',borderRight:'3px solid #E8693D',borderRadius:'0 0 4px 0'}}/>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:10}}>
            <div style={{fontSize:40}}>📷</div>
            <div style={{fontSize:11,color:'#6A6050',textAlign:'center'}}>Camera scanner<br/>(connect to device camera)</div>
          </div>
        </div>

        {/* manual entry */}
        <div>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:1,textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>Or enter code manually</div>
          <div style={{display:'flex',gap:8}}>
            <input
              value={input} onChange={e=>setInput(e.target.value.toUpperCase())}
              onKeyDown={e=>e.key==='Enter'&&handleVerify()}
              placeholder="e.g. UNI-AB3X7K"
              style={{flex:1,padding:'10px 12px',fontSize:13,fontWeight:500,letterSpacing:1,background:'#fff',border:'1.5px solid var(--border)',borderRadius:9,fontFamily:'Syne,sans-serif'}}
            />
            <Btn variant="rust" onClick={()=>handleVerify()}>Verify</Btn>
          </div>
          <div style={{marginTop:10,display:'flex',flexWrap:'wrap',gap:6}}>
            {SAMPLE_ORDERS.map(o=>(
              <button key={o.id} onClick={()=>{setInput(o.id);handleVerify(o.id);}} style={{fontSize:10,fontWeight:600,letterSpacing:.5,padding:'4px 9px',borderRadius:6,background:'#EDE8DF',border:'none',cursor:'pointer',color:'var(--cr)',fontFamily:'Syne,sans-serif'}}>
                {o.id}
              </button>
            ))}
          </div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:6}}>↑ Click a sample code to test</div>
        </div>
      </div>

      {/* result panel */}
      <div style={{padding:28,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',background:'#FAFAF7'}}>
        {scanning && (
          <div style={{textAlign:'center',animation:'fadeIn .2s ease'}}>
            <div style={{width:44,height:44,border:'3px solid var(--border)',borderTopColor:'#C4522A',borderRadius:'50%',margin:'0 auto 16px',animation:'spin .7s linear infinite'}}/>
            <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:16}}>Verifying…</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>Checking with server</div>
          </div>
        )}
        {!scanning && !result && (
          <div style={{textAlign:'center',opacity:.35}}>
            <div style={{fontSize:54,marginBottom:12}}>🔲</div>
            <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:15}}>Awaiting scan</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>Enter a QR code or scan to verify</div>
          </div>
        )}
        {!scanning && result && (
          <div style={{width:'100%',maxWidth:340,animation:'fadeUp .3s cubic-bezier(.34,1.56,.64,1)'}}>
            {result.type==='valid' && <>
              <div style={{background:'#EAF0E8',borderRadius:16,padding:20,marginBottom:14,textAlign:'center'}}>
                <div style={{width:52,height:52,borderRadius:'50%',background:'#4A6741',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px',fontSize:22,color:'#fff'}}>✓</div>
                <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:18,color:'#1C1A17',marginBottom:2}}>Valid Order</div>
                <div style={{fontFamily:'Syne,sans-serif',fontSize:12,letterSpacing:1.5,color:'#4A6741'}}>{result.order.id}</div>
              </div>
              <div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:12,padding:16,marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,paddingBottom:8,borderBottom:'1px solid var(--border)'}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:14}}>{result.order.student}</div>
                    <div style={{fontSize:11,color:'var(--muted)'}}>{result.order.reg}</div>
                  </div>
                  <Badge color="amber">{result.order.paid==='mpesa'?'M-Pesa':result.order.paid==='tigo'?'Tigo':'Halo'}</Badge>
                </div>
                {result.order.items.map((it,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
                    <span>{it.qty}× {it.name}</span>
                    <span style={{color:'var(--muted)'}}>{fmt(it.price)}</span>
                  </div>
                ))}
                <div style={{display:'flex',justifyContent:'space-between',fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:14,marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)'}}>
                  <span>Total</span><span>TZS {fmt(result.order.total)}</span>
                </div>
              </div>
              <Btn fullWidth variant="sage" onClick={markServed}>✓ Mark as Served</Btn>
            </>}
            {result.type==='done' && (
              <div style={{textAlign:'center',background:'#EAF0E8',borderRadius:16,padding:28}}>
                <div style={{fontSize:40,marginBottom:10}}>🍽️</div>
                <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:17,color:'#4A6741',marginBottom:4}}>Order Served!</div>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>QR code has been invalidated</div>
                <Btn variant="ghost" onClick={()=>{setResult(null);setInput('');}}>Scan next order</Btn>
              </div>
            )}
            {result.type==='used' && (
              <div style={{textAlign:'center',background:'#FEF3DC',borderRadius:16,padding:28}}>
                <div style={{fontSize:40,marginBottom:10}}>⚠️</div>
                <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:17,color:'#854F0B',marginBottom:4}}>Already Served</div>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>This order was already collected</div>
                <Btn variant="ghost" onClick={()=>{setResult(null);setInput('');}}>Try again</Btn>
              </div>
            )}
            {result.type==='invalid' && (
              <div style={{textAlign:'center',background:'#FCEBEB',borderRadius:16,padding:28}}>
                <div style={{fontSize:40,marginBottom:10}}>✗</div>
                <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:17,color:'#A32D2D',marginBottom:4}}>Invalid Code</div>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>This QR code was not found</div>
                <Btn variant="ghost" onClick={()=>{setResult(null);setInput('');}}>Try again</Btn>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

    setMeals(prev=>prev.map(m=>m.id===id?{...m,stock:!m.stock}:m));

                <button onClick={()=>startEdit(m)} style={{width:28,height:28,borderRadius:7,border:'1px solid var(--border)',background:'var(--tag)',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>✏️</button>

              </div>
            </div>
            <div style={{marginTop:10,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',gap:5,alignItems:'center'}}>
                {m.badge && <Badge color={m.badge==='popular'?'rust':m.badge==='new'?'amber':'sage'}>{m.badge}</Badge>}

              <div onClick={()=>toggleStock(m.id)} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>

              </div>

      {/* edit modal */}
      <Modal open={!!editing} onClose={()=>setEditing(null)} maxW={420} center>
        <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:18,marginBottom:16}}>Edit meal</div>
        <Input label="Name" value={editForm.name||''} onChange={v=>setEditForm(f=>({...f,name:v}))}/>
        <Input label="Description" value={editForm.desc||''} onChange={v=>setEditForm(f=>({...f,desc:v}))}/>
        <Input label="Price (TZS)" type="number" value={editForm.price||''} onChange={v=>setEditForm(f=>({...f,price:v}))}/>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:500,letterSpacing:1,textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Category</div>
          <select value={editForm.cat||'lunch'} onChange={e=>setEditForm(f=>({...f,cat:e.target.value}))} style={{width:'100%',padding:'10px 12px',border:'1.5px solid var(--border)',borderRadius:10,fontSize:13,background:'#fff'}}>

          </select>
        </div>
        <div style={{display:'flex',gap:8,marginTop:6}}>
          <Btn fullWidth variant="ghost" onClick={()=>setEditing(null)}>Cancel</Btn>
          <Btn fullWidth variant="rust" onClick={saveEdit}>Save changes</Btn>
        </div>
      </Modal>

      {/* add meal modal */}
      <Modal open={showAdd} onClose={()=>setShowAdd(false)} maxW={420} center>
        <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:18,marginBottom:16}}>Add new meal</div>
        <Input label="Name" value={newMeal.name} onChange={v=>setNewMeal(f=>({...f,name:v}))} placeholder="e.g. Ugali na Dagaa"/>
        <Input label="Description" value={newMeal.desc} onChange={v=>setNewMeal(f=>({...f,desc:v}))} placeholder="Short description"/>
        <Input label="Price (TZS)" type="number" value={newMeal.price} onChange={v=>setNewMeal(f=>({...f,price:v}))} placeholder="3000"/>
        <Input label="Emoji" value={newMeal.emoji} onChange={v=>setNewMeal(f=>({...f,emoji:v}))}/>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:500,letterSpacing:1,textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Category</div>
          <select value={newMeal.cat} onChange={e=>setNewMeal(f=>({...f,cat:e.target.value}))} style={{width:'100%',padding:'10px 12px',border:'1.5px solid var(--border)',borderRadius:10,fontSize:13,background:'#fff'}}>
            {['breakfast','lunch','dinner','snacks'].map(c=><option key={c} value={c}>{c.charAt(0).toUpperCase()+c.slice(1)}</option>)}
          </select>
        </div>
        <div style={{display:'flex',gap:8,marginTop:6}}>
          <Btn fullWidth variant="ghost" onClick={()=>setShowAdd(false)}>Cancel</Btn>
          <Btn fullWidth variant="sage" onClick={addMeal}>+ Add to menu</Btn>
        </div>
      </Modal>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════════════════ */
function LoginScreen({onLogin}) {
  const [role, setRole] = useState('student');
  const [id, setId] = useState('');
  const [pass, setPass] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const creds = {
    student:{id:'CS/2022/042',pass:'student123',name:'John M.',initials:'JM'},
    staff:{id:'STAFF001',pass:'staff123',name:'Mary K.',initials:'MK'},
    admin:{id:'ADMIN001',pass:'admin123',name:'Dr. Osei',initials:'DO'},
  };

  const handleLogin = () => {
    const c = creds[role];
    if(id===c.id && pass===c.pass) {
      setLoading(true);
      setTimeout(()=>onLogin({role,name:c.name,initials:c.initials,id}),1000);
    } else {
      setErr('Incorrect credentials. Try the hint below.');
    }
  };

  return (
    <div style={{minHeight:'100vh',background:'#1C1A17',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{width:'100%',maxWidth:400,animation:'fadeUp .4s cubic-bezier(.34,1.56,.64,1)'}}>
        {/* logo */}
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:32,color:'#F5F0E8',letterSpacing:-1,display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
            <div style={{width:10,height:10,borderRadius:'50%',background:'#E8693D'}}/>
            UniEat
          </div>
          <div style={{fontSize:12,color:'#4A4030',marginTop:4}}>University Canteen System</div>
        </div>

        {/* role selector */}
        <div style={{display:'flex',background:'#2D2520',borderRadius:12,padding:4,marginBottom:20,gap:3}}>
          {[['student','Student'],['staff','Staff'],['admin','Admin']].map(([r,l])=>(
            <button key={r} onClick={()=>{setRole(r);setErr('');}} style={{
              flex:1,padding:'8px',borderRadius:9,fontSize:12,fontWeight:600,
              background:role===r?'#C4522A':'transparent',
              color:role===r?'#fff':'#6A6050',
              transition:'all .18s',border:'none',cursor:'pointer',
            }}>{l}</button>
          ))}
        </div>

        {/* form */}
        <div style={{background:'#2D2520',borderRadius:16,padding:22}}>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:600,letterSpacing:1,textTransform:'uppercase',color:'#6A6050',marginBottom:6}}>
              {role==='student'?'University ID':'Staff ID'}
            </div>
            <input value={id} onChange={e=>setId(e.target.value)} placeholder={creds[role].id}
              style={{width:'100%',padding:'11px 14px',fontSize:13,background:'#1C1A17',border:'1.5px solid #3A3530',borderRadius:10,color:'#F5F0E8',fontFamily:'DM Sans,sans-serif'}}
            />
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:600,letterSpacing:1,textTransform:'uppercase',color:'#6A6050',marginBottom:6}}>Password</div>
            <input value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} type="password" placeholder="••••••••"
              style={{width:'100%',padding:'11px 14px',fontSize:13,background:'#1C1A17',border:'1.5px solid #3A3530',borderRadius:10,color:'#F5F0E8',fontFamily:'DM Sans,sans-serif'}}
            />
          </div>
          {err && <div style={{fontSize:11,color:'#E8693D',marginBottom:12,padding:'8px 12px',background:'rgba(232,105,61,.1)',borderRadius:8}}>{err}</div>}
          <button onClick={handleLogin} disabled={loading} style={{
            width:'100%',background:loading?'#3A3530':'#C4522A',color:'#fff',border:'none',borderRadius:10,
            padding:14,fontFamily:'Syne,sans-serif',fontSize:14,fontWeight:700,cursor:loading?'not-allowed':'pointer',
            transition:'background .18s',display:'flex',alignItems:'center',justifyContent:'center',gap:8,
          }}>
            {loading?<><div style={{width:16,height:16,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>Logging in…</>:'Sign in →'}
          </button>
          <div style={{fontSize:10,color:'#4A4030',marginTop:14,textAlign:'center',lineHeight:1.7}}>
            Demo credentials<br/>
            {role==='student'&&<>ID: <span style={{color:'#8A8070'}}>CS/2022/042</span> · Pass: <span style={{color:'#8A8070'}}>student123</span></>}
            {role==='staff'&&<>ID: <span style={{color:'#8A8070'}}>STAFF001</span> · Pass: <span style={{color:'#8A8070'}}>staff123</span></>}
            {role==='admin'&&<>ID: <span style={{color:'#8A8070'}}>ADMIN001</span> · Pass: <span style={{color:'#8A8070'}}>admin123</span></>}
          </div>
        </div>

        {/* guest option */}
        {role==='student' && (
          <button onClick={()=>onLogin({role:'student',name:'Guest',initials:'GU',id:'GUEST'})} style={{
            width:'100%',marginTop:10,padding:'11px',borderRadius:12,border:'1px solid #3A3530',
            background:'transparent',color:'#6A6050',fontSize:12,fontWeight:500,cursor:'pointer',
            transition:'border-color .15s,color .15s',
          }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='#6A6050';e.currentTarget.style.color='#8A8070'}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='#3A3530';e.currentTarget.style.color='#6A6050'}}>
            Continue as guest (no account needed)
          </button>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('');
  const [cart, setCart] = useState({});
  const [toast, showToast] = useToast();

  const handleLogin = (u) => {
    setUser(u);
    setPage(u.role==='student'?'menu':u.role==='staff'?'scanner':'dashboard');
  };

  const handleLogout = () => { setUser(null); setPage(''); setCart({}); };

  if (!user) return (
    <AppCtx.Provider value={{showToast}}>
      <LoginScreen onLogin={handleLogin}/>
      <Toast toast={toast}/>
    </AppCtx.Provider>
  );

  const renderPage = () => {
    if (user.role==='student') {
      if (page==='menu') return <MenuPage cart={cart} setCart={setCart} setPage={setPage}/>;
      if (page==='orders') return <OrdersPage/>;
    }
    if (user.role==='staff') {
      if (page==='scanner') return <ScannerPage/>;
      if (page==='queue') return <QueuePage/>;
    }
    if (user.role==='admin') {
      if (page==='dashboard') return <DashboardPage/>;
      if (page==='menu-mgmt') return <MenuMgmtPage/>;
      if (page==='orders-mgmt') return <OrdersMgmtPage/>;
      if (page==='reports') return <ReportsPage/>;
    }
    return <div style={{padding:40,textAlign:'center',color:'var(--muted)'}}>Page not found</div>;
  };

  return (
    <AppCtx.Provider value={{showToast}}>
      <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar page={page} setPage={setPage} user={user} cart={cart}/>
        <div style={{flex:1,display:'flex',overflow:'hidden',position:'relative'}}>
          {renderPage()}
        </div>
        {/* logout button */}
        <button onClick={handleLogout} style={{
          position:'fixed',bottom:20,right:20,
          background:'#1C1A17',color:'#6A6050',border:'1px solid #3A3530',
          borderRadius:8,padding:'7px 13px',fontSize:11,fontWeight:500,cursor:'pointer',
          zIndex:999,transition:'color .15s',
        }}
        onMouseEnter={e=>e.currentTarget.style.color='#F5F0E8'}
        onMouseLeave={e=>e.currentTarget.style.color='#6A6050'}>
          Sign out
        </button>
      </div>
      <Toast toast={toast}/>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
