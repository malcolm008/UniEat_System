<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
    <title>UniEat — Campus Canteen System</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
          --cr:#1C1A17;--crbg:#F5F0E8;--cww:#FAFAF7;
          --rust:#C4522A;--rustl:#E8693D;--rustbg:#FDF5F2;--rustbg2:#F5E8E2;
          --amber:#D4831A;--ambl:#F0A030;
          --sage:#4A6741;--sagel:#6A8F61;--sagebg:#EAF0E8;
          --muted:#7A7268;--border:#E2D9CC;--tag:#EDE8DF;
          --deep:#2D2520;--card:#FFFFFF;
          --info:#185FA5;--infobg:#E6F1FB;
          --danger:#A32D2D;--dangerbg:#FCEBEB;
          --success:#0F6E56;--successbg:#E1F5EE;
        }
        html,body,#root{height:100%;font-family:'DM Sans',sans-serif;background:var(--crbg);color:var(--cr)}
        button{cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;color:var(--cr)}
        input,select,textarea{font-family:'DM Sans',sans-serif;color:var(--cr);outline:none;border:none}
        a{text-decoration:none;color:inherit}
        ::-webkit-scrollbar{width:4px;height:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes slideRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
        @keyframes slideLeft{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
        @keyframes scanline{0%{top:0}100%{top:100%}}

        .page{animation:fadeIn .25s ease}
        .card-enter{animation:fadeUp .3s ease both}
        .slide-right{animation:slideRight .25s ease}
        .slide-left{animation:slideLeft .25s ease}

        /* ===== RESPONSIVE LAYOUT TWEAKS (no functional changes) ===== */
        @media (max-width: 800px) {
          .menu-layout { grid-template-columns: 1fr !important; }
          .cart-sidebar { position: fixed; bottom: 0; left: 0; right: 0; height: auto; max-height: 65vh; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); z-index: 300; border-left: none !important; top: auto !important; transform: translateY(0); transition: transform 0.2s; }
          .cart-sidebar.closed { transform: translateY(100%); pointer-events: none; }
          .cart-toggle { display: flex !important; }
          .staff-scanner-layout { grid-template-columns: 1fr !important; }
          .admin-dashboard-stats { grid-template-columns: repeat(2,1fr) !important; }
          .admin-grid-2col { grid-template-columns: 1fr !important; }
          .topbar-nav { gap: 4px; flex-wrap: wrap; }
          .topbar-nav button { font-size: 11px; padding: 4px 8px; }
          .topbar-user { gap: 6px; }
        }
        @media (max-width: 560px) {
          .menu-grid { grid-template-columns: 1fr !important; }
          .admin-dashboard-stats { grid-template-columns: 1fr !important; }
          .admin-menu-grid { grid-template-columns: 1fr !important; }
          .order-table thead { display: none; }
          .order-table tr { display: block; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 14px; background: #fff; padding: 12px; }
          .order-table td { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border: none; text-align: right; }
          .order-table td::before { content: attr(data-label); font-weight: 600; font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; flex: 1; text-align: left; }
          .queue-layout { grid-template-columns: 1fr !important; gap: 16px; }
          .dashboard-header { flex-direction: column; align-items: flex-start; gap: 10px; }
          .stat-card-value { font-size: 20px; }
        }
        .cart-toggle { display: none; position: fixed; bottom: 20px; right: 20px; background: #C4522A; color: white; border-radius: 40px; padding: 10px 18px; font-weight: bold; z-index: 250; box-shadow: 0 6px 14px rgba(0,0,0,0.2); align-items: center; gap: 8px; border: none; font-size: 14px; }
        .menu-layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }
        @media (max-width: 800px) {
          .menu-layout { flex-direction: column; }
          .menu-left { width: 100%; max-height: 55vh; overflow-y: auto; }
          .cart-sidebar { position: fixed; bottom: 0; left: 0; right: 0; height: auto; max-height: 60vh; border-radius: 20px 20px 0 0; border-left: none !important; z-index: 300; background: #FAFAF7; border-top: 1px solid var(--border); top: auto !important; transition: transform 0.25s ease; transform: translateY(0); }
          .cart-sidebar.hide-cart { transform: translateY(100%); pointer-events: none; }
          .cart-handle { display: block; width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 8px auto 0; cursor: pointer; }
        }
        .cart-handle { display: none; }
        @media (max-width: 640px) {
          .topbar-nav button span:last-child {
            display: none;
          }
          .topbar-nav button {
            padding: 6px 8px !important;
            font-size: 11px !important;
          }
          header {
            padding: 8px 12px !important;
            gap: 6px !important;
          }
        }

        @media (max-width: 480px) {
          header {
            flex-direction: column;
            align-items: stretch !important;
            gap: 8px !important;
          }
          .topbar-user-info span:first-of-type {
            display: none;
          }
          nav {
            overflow-x: auto;
            flex-wrap: nowrap !important;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
          }
          nav::-webkit-scrollbar {
            display: none;
          }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" src="scripts/main.js"></script>
</body>
</html>
