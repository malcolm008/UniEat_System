<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>UniEat Admin CMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
          --ink:#16120E;--ink80:#2E2922;--ink60:#534D45;--ink40:#7C7570;--ink20:#B8B3AE;--ink10:#DDD9D4;--ink05:#F0EDE9;
          --paper:#FAF8F5;--white:#FFFFFF;
          --fire:#C94B2A;--firedark:#A33A1E;--firesoft:#F5E9E5;
          --gold:#C9851A;--goldsoft:#FBF0DC;
          --leaf:#3D6B38;--leafsoft:#E5F0E4;
          --ocean:#1A5C8A;--oceansoft:#E2EEF7;
          --sidebar-w:220px;--topbar-h:56px;
          --fd:'Playfair Display',serif;
          --fb:'Plus Jakarta Sans',sans-serif;
          --fm:'JetBrains Mono',monospace;
          --ease-out:cubic-bezier(0.16,1,0.3,1);
          --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
        }
        html,body,#root{height:100%;font-family:var(--fb);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
        button{cursor:pointer;border:none;background:none;font-family:var(--fb);color:inherit}
        input,select,textarea{font-family:var(--fb);color:var(--ink);outline:none;border:none}
        ::-webkit-scrollbar{width:4px;height:4px}
        ::-webkit-scrollbar-thumb{background:var(--ink10);border-radius:99px}
        ::-webkit-scrollbar-track{background:transparent}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}

        /* ── LAYOUT ─────────────────────────────── */
        .app{display:flex;height:100vh;overflow:hidden}
        .sidebar{width:var(--sidebar-w);background:var(--ink);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .topbar{height:var(--topbar-h);background:var(--white);border-bottom:1px solid var(--ink10);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
        .content{flex:1;overflow-y:auto;padding:24px;animation:fadeIn .2s ease}

        /* ── SIDEBAR ────────────────────────────── */
        .sidebar-logo{padding:20px 18px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #252018}
        .sidebar-logo-text{font-family:var(--fd);font-size:20px;font-weight:900;color:var(--paper);letter-spacing:-.5px}
        .logo-dot{width:8px;height:8px;border-radius:50%;background:#E07050;flex-shrink:0}
        .sidebar-section{padding:12px 10px 6px;font-family:var(--fm);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#3A3530}
        .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;margin:1px 8px;font-size:13px;font-weight:500;color:#6A6050;cursor:pointer;transition:background .15s,color .15s}
        .nav-item:hover{background:rgba(255,255,255,.05);color:#B8B3AE}
        .nav-item.active{background:rgba(255,255,255,.1);color:var(--paper)}
        .sidebar-bottom{margin-top:auto;padding:12px 8px;border-top:1px solid #252018}
        .sidebar-user{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px}
        .sidebar-avatar{width:28px;height:28px;border-radius:50%;background:var(--fire);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;flex-shrink:0}

        /* ── TOPBAR ─────────────────────────────── */
        .topbar-title{font-family:var(--fd);font-weight:800;font-size:18px;flex:1}
        .topbar-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600;background:var(--leafsoft);color:var(--leaf)}
        .api-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink40)}
        .status-dot{width:7px;height:7px;border-radius:50%}

        /* ── CARDS ──────────────────────────────── */
        .card{background:var(--white);border:1px solid var(--ink10);border-radius:14px;padding:18px}
        .card-sm{background:var(--white);border:1px solid var(--ink10);border-radius:10px;padding:14px}

        /* ── STAT CARDS ─────────────────────────── */
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
        .stat-card{background:var(--white);border:1px solid var(--ink10);border-radius:12px;padding:16px;animation:fadeUp .3s var(--ease-out) both}
        .stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:18px}
        .stat-label{font-family:var(--fm);font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--ink40);margin-bottom:4px}
        .stat-value{font-family:var(--fd);font-size:22px;font-weight:800;line-height:1}
        .stat-sub{font-size:11px;color:var(--ink40);margin-top:4px}

        /* ── TABLE ──────────────────────────────── */
        .table-wrap{background:var(--white);border:1px solid var(--ink10);border-radius:12px;overflow:hidden}
        .table{width:100%;border-collapse:collapse}
        .table th{padding:10px 14px;font-family:var(--fm);font-size:9px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:var(--ink40);text-align:left;background:var(--ink05);border-bottom:1px solid var(--ink10)}
        .table td{padding:12px 14px;font-size:12px;border-bottom:1px solid var(--ink05);vertical-align:middle}
        .table tr:last-child td{border-bottom:none}
        .table tr:hover td{background:#FAFAF8}

        /* ── BADGE ──────────────────────────────── */
        .badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;white-space:nowrap}
        .badge-fire{background:var(--firesoft);color:var(--fire)}
        .badge-gold{background:var(--goldsoft);color:var(--gold)}
        .badge-leaf{background:var(--leafsoft);color:var(--leaf)}
        .badge-ocean{background:var(--oceansoft);color:var(--ocean)}
        .badge-ink{background:var(--ink05);color:var(--ink60)}
        .badge-red{background:#FCEBEB;color:var(--firedark)}

        /* ── BUTTONS ────────────────────────────── */
        .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
        .btn-sm{padding:6px 12px;font-size:11px;border-radius:6px}
        .btn-lg{padding:12px 20px;font-size:14px}
        .btn-full{width:100%;justify-content:center}
        .btn-primary{background:var(--ink);color:var(--paper)}.btn-primary:hover{background:var(--fire)}
        .btn-fire{background:var(--fire);color:white}.btn-fire:hover{background:var(--firedark)}
        .btn-leaf{background:var(--leaf);color:white}.btn-leaf:hover{background:#2D5228}
        .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--ink10)}.btn-ghost:hover{background:var(--ink05)}
        .btn-danger{background:#A33A1E;color:white}.btn-danger:hover{background:#7A1F1F}
        .btn:active{transform:scale(.97)}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

        /* ── INPUTS ─────────────────────────────── */
        .field{margin-bottom:14px}
        .field-label{display:block;font-family:var(--fm);font-size:9px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink40);margin-bottom:6px}
        .field-input{width:100%;padding:10px 12px;border:1.5px solid var(--ink10);border-radius:8px;font-size:13px;background:white;transition:border-color .15s}.field-input:focus{border-color:var(--fire)}
        .field-select{width:100%;padding:10px 12px;border:1.5px solid var(--ink10);border-radius:8px;font-size:13px;background:white;cursor:pointer;appearance:none}.field-select:focus{border-color:var(--fire);outline:none}
        .field-textarea{width:100%;padding:10px 12px;border:1.5px solid var(--ink10);border-radius:8px;font-size:13px;background:white;resize:vertical;min-height:80px}.field-textarea:focus{border-color:var(--fire)}

        /* ── MODAL ──────────────────────────────── */
        .modal-overlay{position:fixed;inset:0;background:rgba(22,18,14,.55);display:flex;align-items:center;justify-content:center;z-index:900;backdrop-filter:blur(4px);padding:16px;animation:fadeIn .18s ease}
        .modal{background:var(--paper);border-radius:16px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:fadeUp .25s var(--ease-spring)}
        .modal-title{font-family:var(--fd);font-weight:800;font-size:19px;margin-bottom:16px}

        /* ── TOGGLE ─────────────────────────────── */
        .toggle{position:relative;width:36px;height:20px;flex-shrink:0}
        .toggle input{opacity:0;width:0;height:0}
        .toggle-slider{position:absolute;inset:0;background:var(--ink10);border-radius:99px;cursor:pointer;transition:background .2s}
        .toggle input:checked+.toggle-slider{background:var(--leaf)}
        .toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:white;border-radius:50%;transition:transform .2s var(--ease-spring);box-shadow:0 1px 3px rgba(0,0,0,.15)}
        .toggle input:checked+.toggle-slider::before{transform:translateX(16px)}

        /* ── SEARCH BAR ─────────────────────────── */
        .search-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1.5px solid var(--ink10);border-radius:8px;background:white;flex:1;max-width:320px}
        .search-bar input{flex:1;font-size:13px;background:transparent}
        .search-bar:focus-within{border-color:var(--fire)}

        /* ── CHART ──────────────────────────────── */
        .bar-chart{display:flex;align-items:flex-end;gap:5px;height:80px}
        .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4}
        .bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .5s var(--ease-out)}
        .bar-label{font-family:var(--fm);font-size:9px;color:var(--ink40)}

        /* ── PROGRESS ───────────────────────────── */
        .progress-row{margin-bottom:12px}
        .progress-meta{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
        .progress-track{height:6px;background:var(--ink05);border-radius:99px;overflow:hidden}
        .progress-fill{height:100%;border-radius:99px;transition:width .6s var(--ease-out)}

        /* ── EMPTY STATE ────────────────────────── */
        .empty{text-align:center;padding:60px 20px;color:var(--ink40)}
        .empty-icon{font-size:40px;opacity:.25;margin-bottom:12px}

        /* ── SPINNER ────────────────────────────── */
        .spinner{width:20px;height:20px;border:2px solid var(--ink10);border-top-color:var(--fire);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
        .spinner-lg{width:36px;height:36px;border-width:3px}
        .loading-page{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:14px}

        /* ── RESPONSIVE ─────────────────────────── */
        @media(max-width:768px){
          .sidebar{display:none}.sidebar.mob-open{display:flex;position:fixed;inset:0;z-index:500;width:100%;max-width:280px}
          .stats-grid{grid-template-columns:1fr 1fr}
          .table-wrap{overflow-x:auto}.table{min-width:600px}
          .content{padding:14px}
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
    const {useState,useEffect,useCallback,useRef,createContext,useContext}=React;

    /* ── CONFIG ────────────────────────────────────────────────────── */
    const API_BASE = 'http://localhost:5000/api';

    /* ── API CLIENT ─────────────────────────────────────────────────── */
    const api = {
      _token: null,
      setToken(t){ this._token = t; if(t) localStorage.setItem('admin_token',t); else localStorage.removeItem('admin_token'); },
      getToken(){ return this._token || localStorage.getItem('admin_token'); },
      async req(method, path, body){
        const headers = {'Content-Type':'application/json'};
        const tok = this.getToken();
        if(tok) headers['Authorization'] = `Bearer ${tok}`;
        const res = await fetch(`${API_BASE}${path}`, {method, headers, body: body ? JSON.stringify(body) : undefined});
        const data = await res.json().catch(()=>({success:false,message:'Invalid response'}));
        if(!res.ok) throw new Error(data.message || 'Request failed');
        return data;
      },
      get: (path) => api.req('GET',path),
      post: (path,b) => api.req('POST',path,b),
      patch: (path,b) => api.req('PATCH',path,b),
      delete: (path) => api.req('DELETE',path),
    };

    /* ── ICONS ──────────────────────────────────────────────────────── */
    const ICONS={
      dashboard:<><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></>,
      menu:<><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>,
      orders:<><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></>,
      users:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
      reports:<><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></>,
      settings:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
      logout:<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
      plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
      edit:<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
      trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>,
      check:<polyline points="20 6 9 17 4 12"/>,
      x:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
      search:<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></>,
      refresh:<><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.57-8.54L23 10"/></>,
      eye:<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
      download:<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
      alert:<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
      'chef-hat':<><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/></>,
      trending:<><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
      calendar:<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
    };
    const Ic=({n,s=15,c='currentColor',sw=1.8})=>(
      <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{display:'inline-block',flexShrink:0}}>
        {ICONS[n]||null}
      </svg>
    );

    /* ── HELPERS ─────────────────────────────────────────────────────── */
    const fmt = n => Number(n||0).toLocaleString();
    const fmtDate = d => d ? new Date(d).toLocaleDateString('en-TZ',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const fmtTime = d => d ? new Date(d).toLocaleTimeString('en-TZ',{hour:'2-digit',minute:'2-digit'}) : '—';

    /* ── CONTEXT ─────────────────────────────────────────────────────── */
    const Ctx = createContext(null);

    /* ── TOAST ───────────────────────────────────────────────────────── */
    function Toast({toasts}){
      return(
        <div style={{position:'fixed',top:16,right:16,zIndex:9999,display:'flex',flexDirection:'column',gap:8}}>
          {toasts.map(t=>(
            <div key={t.id} style={{
              background:t.type==='success'?'#3D6B38':t.type==='error'?'#A33A1E':t.type==='warning'?'#C9851A':'#16120E',
              color:'white',padding:'10px 16px',borderRadius:10,fontSize:13,fontWeight:500,
              display:'flex',alignItems:'center',gap:8,boxShadow:'0 4px 16px rgba(0,0,0,.2)',
              animation:'slideIn .2s var(--ease-spring)',maxWidth:320,
            }}>
              <Ic n={t.type==='success'?'check':t.type==='error'?'x':'alert'} s={14} c="white"/>
              {t.msg}
            </div>
          ))}
        </div>
      );
    }
    function useToasts(){
      const[toasts,setToasts]=useState([]);
      const add=useCallback((msg,type='default')=>{
        const id=Date.now();
        setToasts(p=>[...p,{id,msg,type}]);
        setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3200);
      },[]);
      return[toasts,add];
    }

    /* ── LOGIN PAGE ──────────────────────────────────────────────────── */
    function LoginPage({onLogin}){
      const[id,setId]=useState('');
      const[pass,setPass]=useState('');
      const[loading,setLoading]=useState(false);
      const[err,setErr]=useState('');

      const submit=async()=>{
        if(!id||!pass){setErr('Fill in both fields');return;}
        setLoading(true);setErr('');
        try{
          const data=await api.post('/auth/login',{reg_number:id,password:pass});
          api.setToken(data.data.access_token);
          if(data.data.user.role!=='admin'){setErr('Admin access required');api.setToken(null);return;}
          onLogin(data.data.user);
        }catch(e){setErr(e.message);}
        finally{setLoading(false);}
      };

      return(
        <div style={{minHeight:'100vh',background:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{width:'100%',maxWidth:380,animation:'fadeUp .35s var(--ease-spring)'}}>
            <div style={{textAlign:'center',marginBottom:32}}>
              <div style={{fontFamily:'var(--fd)',fontWeight:900,fontSize:34,color:'var(--paper)',letterSpacing:'-1px',display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:'#E07050'}}/>UniEat
              </div>
              <div style={{fontSize:12,color:'#4A4030',marginTop:6}}>Admin CMS — Content Management System</div>
            </div>
            <div style={{background:'#2E2922',borderRadius:16,padding:24}}>
              <div style={{fontSize:10,fontFamily:'var(--fm)',letterSpacing:1.5,textTransform:'uppercase',color:'#6A6050',marginBottom:6}}>University ID</div>
              <input value={id} onChange={e=>setId(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}
                placeholder="ADMIN001" style={{width:'100%',padding:'12px 14px',background:'var(--ink)',border:'1.5px solid #3A3530',borderRadius:8,fontSize:13,color:'var(--paper)',marginBottom:14,fontFamily:'var(--fb)'}}/>
              <div style={{fontSize:10,fontFamily:'var(--fm)',letterSpacing:1.5,textTransform:'uppercase',color:'#6A6050',marginBottom:6}}>Password</div>
              <input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}
                placeholder="••••••••" style={{width:'100%',padding:'12px 14px',background:'var(--ink)',border:'1.5px solid #3A3530',borderRadius:8,fontSize:13,color:'var(--paper)',marginBottom:err?10:18,fontFamily:'var(--fb)'}}/>
              {err&&<div style={{background:'rgba(201,75,42,.12)',border:'1px solid rgba(201,75,42,.25)',borderRadius:7,padding:'8px 12px',fontSize:11,color:'#E07050',marginBottom:14,display:'flex',alignItems:'center',gap:6}}><Ic n="alert" s={12} c="#E07050"/>{err}</div>}
              <button onClick={submit} disabled={loading} style={{width:'100%',padding:13,background:'var(--fire)',color:'white',border:'none',borderRadius:8,fontFamily:'var(--fd)',fontSize:14,fontWeight:700,cursor:loading?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                {loading?<><div className="spinner" style={{borderTopColor:'white'}}/>Signing in…</>:<><Ic n="check" s={15} c="white"/>Sign in to Admin</>}
              </button>
              <div style={{textAlign:'center',fontSize:10,fontFamily:'var(--fm)',color:'#3A3530',marginTop:14,lineHeight:1.8}}>
                Demo: <span style={{color:'#6A6050'}}>ADMIN001</span> / <span style={{color:'#6A6050'}}>admin123</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── DASHBOARD ───────────────────────────────────────────────────── */
    function Dashboard(){
      const{toast}=useContext(Ctx);
      const[stats,setStats]=useState(null);
      const[loading,setLoading]=useState(true);

      useEffect(()=>{
        api.get('/orders/stats')
          .then(d=>setStats(d.data))
          .catch(e=>toast(e.message,'error'))
          .finally(()=>setLoading(false));
      },[]);

      if(loading)return<div className="loading-page"><div className="spinner spinner-lg"/><div style={{fontSize:13,color:'var(--ink40)'}}>Loading dashboard…</div></div>;
      if(!stats)return<div className="empty"><div className="empty-icon">📊</div>Could not load stats</div>;

      const today=stats.today||{};
      const weekly=stats.weekly_revenue||[];
      const topItems=stats.top_items||[];
      const payBreak=stats.payment_breakdown||[];
      const maxRev=Math.max(...weekly.map(d=>Number(d.revenue)||0),1);

      const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const chartData=Array.from({length:7},(_,i)=>{
        const d=new Date();d.setDate(d.getDate()-6+i);
        const iso=d.toISOString().split('T')[0];
        const found=weekly.find(r=>r.date?.slice(0,10)===iso);
        return{day:DAYS[d.getDay()],v:Number(found?.revenue)||0,isToday:i===6};
      });

      return(
        <div style={{animation:'fadeIn .2s ease'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
            <div>
              <div style={{fontFamily:'var(--fd)',fontWeight:800,fontSize:22}}>Dashboard</div>
              <div style={{fontSize:12,color:'var(--ink40)',marginTop:2}}>{new Date().toLocaleDateString('en-TZ',{weekday:'long',day:'numeric',month:'long'})}</div>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={()=>window.location.reload()}><Ic n="refresh" s={13}/>Refresh</button>
          </div>

          <div className="stats-grid">
            {[
              {label:'Revenue today',value:`TZS ${fmt(today.revenue_today)}`,sub:`Week: TZS ${fmt(today.revenue_week)}`,icon:'trending',bg:'var(--firesoft)',ic:'var(--fire)',delay:0},
              {label:'Orders today', value:fmt(today.orders_today), sub:`${fmt(today.pending_today)} pending`,icon:'orders',bg:'var(--goldsoft)',ic:'var(--gold)',delay:60},
              {label:'Orders served', value:fmt(today.served_today), sub:'today',icon:'check',bg:'var(--leafsoft)',ic:'var(--leaf)',delay:120},
              {label:'Avg order value',value:`TZS ${fmt(Math.round(today.avg_order_value))}`,sub:'incl. service charge',icon:'reports',bg:'var(--oceansoft)',ic:'var(--ocean)',delay:180},
            ].map(s=>(
              <div key={s.label} className="stat-card" style={{animationDelay:`${s.delay}ms`}}>
                <div className="stat-icon" style={{background:s.bg}}><Ic n={s.icon} s={18} c={s.ic}/></div>
                <div className="stat-label">{s.label}</div>
                <div className="stat-value">{s.value}</div>
                <div className="stat-sub">{s.sub}</div>
              </div>
            ))}
          </div>

          <div style={{display:'grid',gridTemplateColumns:'minmax(0,2fr) minmax(0,1fr)',gap:14,marginBottom:14}}>
            <div className="card">
              <div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:16,marginBottom:4}}>Weekly Revenue</div>
              <div style={{fontSize:11,color:'var(--ink40)',marginBottom:16}}>Last 7 days — today highlighted</div>
              <div className="bar-chart">
                {chartData.map((d,i)=>(
                  <div key={i} className="bar-col">
                    <div className="bar" style={{height:Math.round((d.v/maxRev)*72),background:d.isToday?'var(--fire)':'var(--ink10)'}}/>
                    <span className="bar-label">{d.day}</span>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:14,paddingTop:12,borderTop:'1px solid var(--ink10)',fontSize:12}}>
                <div><div style={{color:'var(--ink40)'}}>Period total</div><div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:15,marginTop:2}}>TZS {fmt(chartData.reduce((s,d)=>s+d.v,0))}</div></div>
                <div style={{textAlign:'right'}}><div style={{color:'var(--ink40)'}}>Today</div><div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:15,color:'var(--fire)',marginTop:2}}>TZS {fmt(today.revenue_today)}</div></div>
              </div>
            </div>

            <div className="card">
              <div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:16,marginBottom:16}}>Payment Providers</div>
              {payBreak.length===0
                ? <div style={{textAlign:'center',padding:'20px 0',color:'var(--ink40)',fontSize:12}}>No payment data yet</div>
                : payBreak.map((p,i)=>{
                  const total=payBreak.reduce((s,x)=>s+Number(x.count),0)||1;
                  const pct=Math.round((Number(p.count)/total)*100);
                  const colors={mpesa:'#00A651',tigopesa:'#003087',halopesa:'#E31837'};
                  const labels={mpesa:'M-Pesa',tigopesa:'Tigo Pesa',halopesa:'HaloPesa'};
                  return(
                    <div key={i} className="progress-row">
                      <div className="progress-meta">
                        <span style={{fontWeight:600}}>{labels[p.provider]||p.provider}</span>
                        <span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--ink40)'}}>{pct}%</span>
                      </div>
                      <div className="progress-track"><div className="progress-fill" style={{width:pct+'%',background:colors[p.provider]||'var(--ink40)'}}/></div>
                    </div>
                  );
                })
              }
            </div>
          </div>

          <div className="card">
            <div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:16,marginBottom:16}}>Top Selling Today</div>
            {topItems.length===0
              ? <div style={{textAlign:'center',padding:'20px 0',color:'var(--ink40)',fontSize:12}}>No sales data yet for today</div>
              : topItems.map((m,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<topItems.length-1?'1px solid var(--ink10)':'none'}}>
                  <div style={{width:30,height:30,borderRadius:8,background:'var(--ink05)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--fm)',fontWeight:600,fontSize:11,color:'var(--ink40)',flexShrink:0}}>#{i+1}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600}}>{m.name}</div>
                    <div style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--ink40)',marginTop:2}}>{m.total_qty} orders</div>
                  </div>
                  <div style={{fontFamily:'var(--fd)',fontWeight:700,fontSize:13}}>TZS {fmt(m.total_revenue)}</div>
                </div>
              ))
            }
          </div>
        </div>
      );
    }

    /* ── MENU MANAGEMENT ─────────────────────────────────────────────── */
    function MenuManagement(){
      const{toast}=useContext(Ctx);
      const[items,setItems]=useState([]);
      const[cats,setCats]=useState([]);
      const[loading,setLoading]=useState(true);
      const[search,setSearch]=useState('');
      const[catFilter,setCatFilter]=useState('');
      const[showModal,setShowModal]=useState(false);
      const[editing,setEditing]=useState(null);
      const[saving,setSaving]=useState(false);
      const[form,setForm]=useState({name:'',description:'',price:'',category_id:'',emoji:'🍽️',badge:'',calories:'',is_available:true});

      const load=async()=>{
        setLoading(true);
        try{
          const[menuData,catData]=await Promise.all([api.get('/menu/items?limit=100'),api.get('/menu/categories')]);
          setItems(menuData.data||[]);
          setCats(catData.data||[]);
        }catch(e){toast(e.message,'error');}
        finally{setLoading(false);}
      };
      useEffect(()=>{load();},[]);

      const openAdd=()=>{ setEditing(null);setForm({name:'',description:'',price:'',category_id:cats[0]?.id||'',emoji:'🍽️',badge:'',calories:'',is_available:true});setShowModal(true); };
      const openEdit=item=>{ setEditing(item);setForm({name:item.name,description:item.description||'',price:item.price,category_id:item.category_id,emoji:item.emoji||'🍽️',badge:item.badge||'',calories:item.calories||'',is_available:item.is_available});setShowModal(true); };

      const save=async()=>{
        if(!form.name||!form.price){toast('Name and price are required','error');return;}
        setSaving(true);
        try{
          const payload={...form,price:Number(form.price),calories:form.calories?Number(form.calories):null,badge:form.badge||null};
          if(editing){ await api.patch(`/menu/items/${editing.id}`,payload);toast('Meal updated','success'); }
          else{ await api.post('/menu/items',payload);toast('Meal added to menu','success'); }
          setShowModal(false);load();
        }catch(e){toast(e.message,'error');}
        finally{setSaving(false);}
      };

      const toggle=async(item)=>{
        try{ await api.patch(`/menu/items/${item.id}/toggle`);toast(`${item.name} ${item.is_available?'disabled':'enabled'}`,'success');load(); }
        catch(e){toast(e.message,'error');}
      };

      const del=async(item)=>{
        if(!confirm(`Delete "${item.name}"? This cannot be undone.`))return;
        try{ await api.delete(`/menu/items/${item.id}`);toast('Item deleted','success');load(); }
        catch(e){toast(e.message,'error');}
      };

      const filtered=items.filter(m=>{
        const q=search.toLowerCase();
        const matchSearch=!q||m.name.toLowerCase().includes(q)||(m.description||'').toLowerCase().includes(q);
        const matchCat=!catFilter||m.category_id==catFilter;
        return matchSearch&&matchCat;
      });

      return(
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
            <div>
              <div style={{fontFamily:'var(--fd)',fontWeight:800,fontSize:22}}>Menu Management</div>
              <div style={{fontSize:12,color:'var(--ink40)',marginTop:2}}>{items.length} items · {items.filter(m=>m.is_available).length} available</div>
            </div>
            <button className="btn btn-fire" onClick={openAdd}><Ic n="plus" s={14} c="white"/>Add meal</button>
          </div>

          {/* Filters */}
          <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
            <div className="search-bar">
              <Ic n="search" s={14} c="var(--ink40)"/>
              <input placeholder="Search meals…" value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <select className="field-select" style={{width:'auto',minWidth:140}} value={catFilter} onChange={e=>setCatFilter(e.target.value)}>
              <option value="">All categories</option>
              {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>

          {loading?<div className="loading-page"><div className="spinner spinner-lg"/></div>:(
            <div className="table-wrap">
              <table className="table">
                <thead><tr>
                  <th>Item</th><th>Category</th><th>Price</th><th>Calories</th><th>Badge</th><th>Status</th><th>Actions</th>
                </tr></thead>
                <tbody>
                  {filtered.length===0?<tr><td colSpan={7}><div className="empty"><div className="empty-icon">🍽️</div>No items found</div></td></tr>
                  :filtered.map(item=>(
                    <tr key={item.id}>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          <span style={{fontSize:22,flexShrink:0}}>{item.emoji}</span>
                          <div>
                            <div style={{fontWeight:600,fontSize:13}}>{item.name}</div>
                            <div style={{fontSize:11,color:'var(--ink40)',maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.description}</div>
                          </div>
                        </div>
                      </td>
                      <td><span className="badge badge-ink">{item.category_name||'—'}</span></td>
                      <td><span style={{fontFamily:'var(--fm)',fontSize:12,fontWeight:500}}>TZS {fmt(item.price)}</span></td>
                      <td><span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--ink40)'}}>{item.calories?`${item.calories} kcal`:'—'}</span></td>
                      <td>{item.badge?<span className={`badge badge-${item.badge==='popular'?'fire':'gold'}`}>{item.badge}</span>:<span style={{color:'var(--ink20)',fontSize:12}}>—</span>}</td>
                      <td>
                        <label className="toggle">
                          <input type="checkbox" checked={item.is_available} onChange={()=>toggle(item)}/>
                          <span className="toggle-slider"/>
                        </label>
                      </td>
                      <td>
                        <div style={{display:'flex',gap:5}}>
                          <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(item)}><Ic n="edit" s={12}/>Edit</button>
                          <button className="btn btn-sm" style={{background:'#FCEBEB',color:'var(--firedark)'}} onClick={()=>del(item)}><Ic n="trash" s={12} c="var(--firedark)"/></button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {showModal&&(
            <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
              <div className="modal">
                <div className="modal-title">{editing?'Edit Meal':'Add New Meal'}</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
                  <div className="field" style={{gridColumn:'1/-1'}}>
                    <label className="field-label">Meal name *</label>
                    <input className="field-input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Ugali na Dagaa"/>
                  </div>
                  <div className="field" style={{gridColumn:'1/-1'}}>
                    <label className="field-label">Description</label>
                    <textarea className="field-textarea" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Short description of the meal"/>
                  </div>
                  <div className="field">
                    <label className="field-label">Price (TZS) *</label>
                    <input className="field-input" type="number" min={1} value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))}/>
                  </div>
                  <div className="field">
                    <label className="field-label">Calories (kcal)</label>
                    <input className="field-input" type="number" min={0} value={form.calories} onChange={e=>setForm(f=>({...f,calories:e.target.value}))} placeholder="Optional"/>
                  </div>
                  <div className="field">
                    <label className="field-label">Category</label>
                    <select className="field-select" value={form.category_id} onChange={e=>setForm(f=>({...f,category_id:e.target.value}))}>
                      {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                    </select>
                  </div>
                  <div className="field">
                    <label className="field-label">Badge</label>
                    <select className="field-select" value={form.badge} onChange={e=>setForm(f=>({...f,badge:e.target.value}))}>
                      <option value="">None</option>
                      <option value="popular">Popular</option>
                      <option value="new">New</option>
                    </select>
                  </div>
                  <div className="field">
                    <label className="field-label">Emoji</label>
                    <input className="field-input" value={form.emoji} onChange={e=>setForm(f=>({...f,emoji:e.target.value}))} style={{fontSize:20}}/>
                  </div>
                  <div className="field" style={{display:'flex',alignItems:'center',gap:10,paddingTop:22}}>
                    <label className="toggle" style={{marginLeft:4}}>
                      <input type="checkbox" checked={form.is_available} onChange={e=>setForm(f=>({...f,is_available:e.target.checked}))}/>
                      <span className="toggle-slider"/>
                    </label>
                    <span style={{fontSize:12,fontWeight:600,color:'var(--ink60)'}}>Available on menu</span>
                  </div>
                </div>
                <div style={{display:'flex',gap:8,marginTop:6}}>
                  <button className="btn btn-ghost btn-full" onClick={()=>setShowModal(false)}>Cancel</button>
                  <button className="btn btn-fire btn-full" onClick={save} disabled={saving}>
                    {saving?<><div className="spinner" style={{borderTopColor:'white'}}/>Saving…</>:<><Ic n="check" s={14} c="white"/>{editing?'Save changes':'Add to menu'}</>}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ── ORDERS MANAGEMENT ───────────────────────────────────────────── */
    function OrdersManagement(){
      const{toast}=useContext(Ctx);
      const[orders,setOrders]=useState([]);
      const[pagination,setPagination]=useState({});
      const[loading,setLoading]=useState(true);
      const[statusFilter,setStatusFilter]=useState('');
      const[search,setSearch]=useState('');
      const[page,setPage]=useState(1);
      const[selected,setSelected]=useState(null);

      const load=useCallback(async()=>{
        setLoading(true);
        try{
          const qs=new URLSearchParams({page,limit:15,...(statusFilter&&{status:statusFilter}),...(search&&{search})});
          const data=await api.get(`/orders?${qs}`);
          setOrders(data.data||[]);setPagination(data.pagination||{});
        }catch(e){toast(e.message,'error');}
        finally{setLoading(false);}
      },[page,statusFilter,search]);
      useEffect(()=>{load();},[load]);

      const updateStatus=async(id,status)=>{
        try{await api.patch(`/orders/${id}/status`,{status});toast(`Status → ${status}`,'success');load();}
        catch(e){toast(e.message,'error');}
      };

      const STATUS_COLORS={pending:'gold',paid:'ocean',preparing:'ocean',ready:'leaf',served:'leaf',cancelled:'red',refunded:'ink'};
      const STATUS_NEXT={pending:'paid',paid:'preparing',preparing:'ready',ready:'served'};

      return(
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
            <div>
              <div style={{fontFamily:'var(--fd)',fontWeight:800,fontSize:22}}>Orders</div>
              <div style={{fontSize:12,color:'var(--ink40)',marginTop:2}}>{pagination.total||0} total orders</div>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={load}><Ic n="refresh" s={13}/>Refresh</button>
          </div>

          <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
            <div className="search-bar">
              <Ic n="search" s={14} c="var(--ink40)"/>
              <input placeholder="Search by name, ID…" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
            </div>
            <div style={{display:'flex',gap:5}}>
              {['','pending','paid','preparing','ready','served','cancelled'].map(s=>(
                <button key={s} onClick={()=>{setStatusFilter(s);setPage(1);}}
                  className={`btn btn-sm ${statusFilter===s?'btn-primary':'btn-ghost'}`}>
                  {s||'All'}
                </button>
              ))}
            </div>
          </div>

          {loading?<div className="loading-page"><div className="spinner spinner-lg"/></div>:(
            <>
              <div className="table-wrap">
                <table className="table">
                  <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Time</th><th>Status</th><th>Actions</th></tr></thead>
                  <tbody>
                    {orders.length===0?<tr><td colSpan={8}><div className="empty"><div className="empty-icon">📋</div>No orders found</div></td></tr>
                    :orders.map(o=>(
                      <tr key={o.id}>
                        <td><span style={{fontFamily:'var(--fm)',fontSize:11,fontWeight:500,letterSpacing:.8}}>{o.id?.slice(0,8)}…</span></td>
                        <td>
                          <div style={{fontWeight:600,fontSize:12}}>{o.customer_name}</div>
                          <div style={{fontSize:10,color:'var(--ink40)'}}>{o.reg_number}</div>
                        </td>
                        <td style={{maxWidth:160}}>
                          <div style={{fontSize:11,color:'var(--ink60)',lineHeight:1.5}}>
                            {(o.items||[]).slice(0,2).map((it,i)=><span key={i}>{i>0&&', '}{it.quantity}× {it.name}</span>)}
                            {(o.items||[]).length>2&&<span style={{color:'var(--ink40)'}}> +{o.items.length-2} more</span>}
                          </div>
                        </td>
                        <td><span style={{fontFamily:'var(--fm)',fontWeight:600,fontSize:12}}>TZS {fmt(o.total)}</span></td>
                        <td>{o.payment_provider?<span className={`badge badge-${o.payment_provider==='mpesa'?'leaf':o.payment_provider==='tigopesa'?'ocean':'fire'}`}>{o.payment_provider}</span>:'—'}</td>
                        <td><span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--ink40)'}}>{fmtTime(o.created_at)}</span></td>
                        <td><span className={`badge badge-${STATUS_COLORS[o.status]||'ink'}`}>{o.status}</span></td>
                        <td>
                          <div style={{display:'flex',gap:4}}>
                            <button className="btn btn-ghost btn-sm" onClick={()=>setSelected(o)}><Ic n="eye" s={11}/>View</button>
                            {STATUS_NEXT[o.status]&&(
                              <button className="btn btn-sm btn-leaf" onClick={()=>updateStatus(o.id,STATUS_NEXT[o.status])} style={{fontSize:10,padding:'5px 8px'}}>
                                →{STATUS_NEXT[o.status]}
                              </button>
                            )}
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {/* Pagination */}
              {pagination.pages>1&&(
                <div style={{display:'flex',justifyContent:'center',gap:6,marginTop:14}}>

    /* ── USERS MANAGEMENT ────────────────────────────────────────────── */
    function UsersManagement(){
      const{toast}=useContext(Ctx);
      const[users,setUsers]=useState([]);
      const[loading,setLoading]=useState(true);
      const[search,setSearch]=useState('');
      const[roleFilter,setRoleFilter]=useState('');
      const[showModal,setShowModal]=useState(false);
      const[form,setForm]=useState({name:'',email:'',reg_number:'',password:'',role:'student'});
      const[saving,setSaving]=useState(false);

      const load=async()=>{
        setLoading(true);
        try{const data=await api.get('/users?limit=100');setUsers(data.data||[]);}
        catch(e){toast(e.message,'error');}
        finally{setLoading(false);}
      };
      useEffect(()=>{load();},[]);

      const save=async()=>{
        if(!form.name||!form.reg_number||!form.password){toast('Name, ID and password required','error');return;}
        setSaving(true);
        try{
          await api.post('/auth/register',form);
          toast('User created','success');setShowModal(false);setForm({name:'',email:'',reg_number:'',password:'',role:'student'});load();
        }catch(e){toast(e.message,'error');}
        finally{setSaving(false);}
      };

      const toggleActive=async(user)=>{
        try{await api.patch(`/users/${user.id}`,{is_active:!user.is_active});toast(`User ${user.is_active?'deactivated':'activated'}`,'success');load();}
        catch(e){toast(e.message,'error');}
      };

      const filtered=users.filter(u=>{
        const q=search.toLowerCase();
        return(!q||(u.name||'').toLowerCase().includes(q)||(u.reg_number||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q))&&(!roleFilter||u.role===roleFilter);
      });

      const ROLE_C={student:'ink',staff:'ocean',admin:'fire'};

      return(
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
            <div>
              <div style={{fontFamily:'var(--fd)',fontWeight:800,fontSize:22}}>Users</div>
              <div style={{fontSize:12,color:'var(--ink40)',marginTop:2}}>{users.length} registered · {users.filter(u=>u.is_active).length} active</div>
            </div>
            <button className="btn btn-fire" onClick={()=>setShowModal(true)}><Ic n="plus" s={14} c="white"/>Add user</button>
          </div>

          <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
            <div className="search-bar">
              <Ic n="search" s={14} c="var(--ink40)"/>
              <input placeholder="Search users…" value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <div style={{display:'flex',gap:5}}>
              {['','student','staff','admin'].map(r=>(
                <button key={r} onClick={()=>setRoleFilter(r)} className={`btn btn-sm ${roleFilter===r?'btn-primary':'btn-ghost'}`}>
                  {r||'All roles'}
                </button>
              ))}
            </div>
          </div>

          {loading?<div className="loading-page"><div className="spinner spinner-lg"/></div>:(
            <div className="table-wrap">
              <table className="table">
                <thead><tr><th>Name</th><th>ID / Reg. No.</th><th>Email</th><th>Role</th><th>Joined</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>
                  {filtered.length===0?<tr><td colSpan={7}><div className="empty"><div className="empty-icon">👤</div>No users found</div></td></tr>
                  :filtered.map(u=>(
                    <tr key={u.id}>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <div style={{width:28,height:28,borderRadius:'50%',background:u.role==='admin'?'var(--ocean)':u.role==='staff'?'var(--leaf)':'var(--fire)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'white',flexShrink:0}}>
                            {(u.name||'?').slice(0,2).toUpperCase()}
                          </div>
                          <span style={{fontWeight:600,fontSize:13}}>{u.name}</span>
                        </div>
                      </td>
                      <td><span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--ink60)'}}>{u.reg_number}</span></td>
                      <td><span style={{fontSize:11,color:'var(--ink40)'}}>{u.email||'—'}</span></td>
                      <td><span className={`badge badge-${ROLE_C[u.role]||'ink'}`}>{u.role}</span></td>
                      <td><span style={{fontFamily:'var(--fm)',fontSize:11,color:'var(--ink40)'}}>{fmtDate(u.created_at)}</span></td>
                      <td>
                        <label className="toggle">
                          <input type="checkbox" checked={u.is_active} onChange={()=>toggleActive(u)}/>
                          <span className="toggle-slider"/>
                        </label>
                      </td>
                      <td><button className="btn btn-ghost btn-sm"><Ic n="eye" s={11}/>View</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {showModal&&(
            <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
              <div className="modal">
                <div className="modal-title">Add New User</div>
                {[['Full name *','name','text','John Mwangi'],['University ID *','reg_number','text','CS/2024/001'],['Email','email','email','john@student.ac.tz'],['Password *','password','password','min 6 characters']].map(([l,k,t,ph])=>(
                  <div key={k} className="field">
                    <label className="field-label">{l}</label>
                    <input className="field-input" type={t} placeholder={ph} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}/>
                  </div>
                ))}
                <div className="field">
                  <label className="field-label">Role</label>
                  <select className="field-select" value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
                    <option value="student">Student</option>
                    <option value="staff">Canteen Staff</option>
                    <option value="admin">Admin</option>
                  </select>
                </div>
                <div style={{display:'flex',gap:8,marginTop:6}}>
                  <button className="btn btn-ghost btn-full" onClick={()=>setShowModal(false)}>Cancel</button>
                  <button className="btn btn-fire btn-full" onClick={save} disabled={saving}>

                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

                      <div className="bar-chart" style={{height:90}}>

                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,color:'#8A8070',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div>
                    <div style={{fontSize:10,color:'#4A4030'}}>{user.reg_number}</div>
                  </div>
                  <button onClick={logout} style={{width:28,height:28,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:'#4A4030',transition:'color .15s'}} title="Sign out"
                    onMouseEnter={e=>e.currentTarget.style.color='#8A8070'}
                    onMouseLeave={e=>e.currentTarget.style.color='#4A4030'}>
                    <Ic n="logout" s={14} c="currentColor"/>
                  </button>
                </div>
              </div>
            </aside>

            {/* Main */}
            <div className="main">
              <div className="topbar">
                <div className="topbar-title">{PAGE_TITLES[page]}</div>
                <div className="api-status">
                  <div className="status-dot" style={{background:'var(--leaf)',animation:'pulse 2s ease infinite'}}/>
                  API live
                </div>
                <span className="topbar-badge"><Ic n="check" s={11} c="var(--leaf)"/>Admin session</span>
              </div>
              <div className="content">
                {page==='dashboard'&&<Dashboard/>}
                {page==='menu'&&<MenuManagement/>}
                {page==='orders'&&<OrdersManagement/>}
                {page==='users'&&<UsersManagement/>}
                {page==='reports'&&<Reports/>}
                {page==='settings'&&<Settings user={user}/>}
              </div>
            </div>
          </div>
          <Toast toasts={toasts}/>
        </Ctx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
